# https://pnpm.io/settings
#
# ```bash
# pnpm config list
# ```

# 依存パッケージのライフサイクルスクリプトの許可リスト
allowBuilds:
  lefthook: false

# transitive dependencyをrootのnode_modulesまで巻き上げる
publicHoistPattern:
  - "@types/*"
  - "*eslint*"
  - "*prettier*"

# 自前パッケージは待たず即取り込みたいので除外する。
minimumReleaseAgeExclude:
  - "@nozomiishii/*"
  - git-harvest

# pinバージョンでインストールする
savePrefix: ""

# ログ出力形式をカスタマイズ
reporter: append-only
