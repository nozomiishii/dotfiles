# @see
# https://github.com/evilmartians/lefthook
#
# Run the command to test:
#   pnpx lefthook run [-v,--verbose] <hook-name>
#
# Examples:
#   pnpx lefthook run --verbose pre-commit
#   pnpx lefthook run --verbose commit-msg
#   pnpx lefthook run --verbose post-merge
#   pnpx lefthook run --verbose pre-push
extends:
  - ./node_modules/@nozomiishii/lefthook-config/index.yaml

post-merge:
  parallel: true
  # post-merge does not auto-populate changed files, so glob alone won't filter.
  # Feed the merge diff to jobs so their glob can actually skip when unrelated.
  files: git diff-tree -r --name-only --no-commit-id ORIG_HEAD HEAD
  jobs:
    - name: symlink
      glob: 'home/**'
      # Only re-stow when a path is added or removed under home/. Edits to
      # existing files don't need re-linking — the symlink already points at
      # them. Deletions still trigger make link so stow can clean up the
      # dangling symlink.
      files: git diff-tree -r --name-only --no-commit-id --diff-filter=AD ORIG_HEAD HEAD
      run: make link
    - name: homebrew
      glob: '{Brewfile,Brewfile.optional}'
      interactive: true
      run: make homebrew

pre-push:
  parallel: true
  jobs:
    - name: check-pr-not-merged
      run: bash scripts/check-pr-not-merged.sh

pre-commit:
  parallel: true
  jobs:
    - name: readme-sync-check
      glob: '{README.md,README.ja.md}'
      run: git diff --cached --name-only | bash scripts/check-readme-sync.sh
    - name: skills-sync-check
      glob: 'home/.config/skills/**'
      run: bash scripts/check-skills-sync.sh
