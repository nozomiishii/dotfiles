# @see
# https://github.com/evilmartians/lefthook
#
# Run the command to test:
#   pnpx lefthook run [-v,--verbose] <hook-name>
#
# Examples:
#   pnpx lefthook run --verbose pre-commit
#   pnpx lefthook run --verbose commit-msg
#   pnpx lefthook run --verbose post-merge
extends:
  - ./node_modules/@nozomiishii/lefthook-config/index.yaml

pre-commit:
  parallel: true
  jobs:
    - name: readme-sync-check
      glob: '{README.md,README.ja.md}'
      run: git diff --cached --name-only | bash scripts/check-readme-sync.sh
    - name: skills-sync-check
      glob: 'home/.config/skills/**'
      run: bash scripts/check-skills-sync.sh
