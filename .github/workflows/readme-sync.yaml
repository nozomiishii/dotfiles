name: README sync check

on:
  pull_request:
    paths:
      - 'README.md'
      - 'README.ja.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  check:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions:
      contents: read  # required by actions/checkout to fetch repository code
      pull-requests: read  # required by gh pr diff to list PR files via the GitHub API
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Check README sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr diff "$PR_NUMBER" \
            --repo "$REPO" \
            --name-only \
          | bash scripts/check-readme-sync.sh

