name: CI

on:
  schedule:
    # The cron syntax consists of 5 fields: minute, hour, day, month, and day of the week.
    # This configuration means "run the workflow at 0 minutes, 0 hours, on every Monday".
    # So the workflow will run every Monday at 00:00 UTC.
    - cron: "0 0 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'install.sh'
      - 'Makefile'
      - 'Brewfile'
      - 'scripts/**'
  pull_request:
    paths:
      - 'install.sh'
      - 'Makefile'
      - 'Brewfile'
      - 'scripts/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  install:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    permissions:
      contents: read  # required by actions/checkout to fetch repository code
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - name: Get code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run install (PR branch)
        if: github.event_name == 'pull_request'
        run: bash ./install.sh
        env:
          TENV_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run install (from URL)
        if: github.event_name != 'pull_request'
        run: curl -L https://nozomiishii.dev/dotfiles/install | bash
        env:
          TENV_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
