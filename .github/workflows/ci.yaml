name: CI

on:
  schedule:
    # The cron syntax consists of 5 fields: minute, hour, day, month, and day of the week.
    # This configuration means "run the workflow at 0 minutes, 0 hours, on every Monday".
    # So the workflow will run every Monday at 00:00 UTC.
    - cron: "0 0 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  install:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - name: Get code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run install (PR branch)
        if: github.event_name == 'pull_request'
        run: bash ./install.sh
        env:
          TENV_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run install (from URL)
        if: github.event_name != 'pull_request'
        run: curl -L https://nozomiishii.dev/dotfiles/install | bash
        env:
          TENV_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
