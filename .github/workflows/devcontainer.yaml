name: Devcontainer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.devcontainer/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-devcontainer

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read  # required by actions/checkout to fetch repository code
      packages: write  # required by docker/build-push-action to publish the image to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Log in to Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # https://github.com/devcontainers/cli/issues/404
      # ほんとはdevcontainers/ci@v0.3.1900000417でpushまでしたいけど、dockerComposeFileをimage化しようとするとエラーになる
      # - name: Smoke run with devcontainers/ci (amd64)
      #   uses: devcontainers/ci@v0.3
      #   with:
      #     configFile: .devcontainer/devcontainer.json
      #     platform: linux/amd64
      #     push: never
      #     cacheFrom: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      #     runCmd: |
      #       node --version
      #       pnpm --version

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # 古くなったGHCR container imageを上手に消す方法が見つからないのでsha管理は保留
            # type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push devcontainer (multi-arch)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max,oci-mediatypes=true
